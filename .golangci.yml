# golangci-lint config for bee (v2 schema).
# kept conservative — passing lint must not require touching existing code.
# enable only linters that report zero issues today; expand deliberately.

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - ineffassign

  exclusions:
    paths:
      - docs
      - vendor

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

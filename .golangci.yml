# golangci-lint config for bee (v2 schema).
# kept conservative — passing lint must not require touching existing code.
# enable only linters that report zero issues today; expand deliberately.

version: "2"

run:
  timeout: 5m
  tests: true
  # pin to 1.25 — golangci-lint v2.5.0 ships with go1.25 toolchain and
  # rejects a 1.26 go.mod target. enabled linters (govet, ineffassign)
  # do not need 1.26 syntax features.
  go: "1.25"

linters:
  default: none
  enable:
    - govet
    - ineffassign

  exclusions:
    paths:
      - docs
      - vendor

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

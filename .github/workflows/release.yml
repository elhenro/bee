name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      EXT: ${{ matrix.ext }}
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: build
        run: |
          set -eu
          out="bee-${GOOS}-${GOARCH}${EXT}"
          tag="${GITHUB_REF_NAME:-dev}"
          commit="${GITHUB_SHA::8}"
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${tag} -X main.commit=${commit}" \
            -o "$out" ./cmd/bee
          sha256sum "$out" > "${out}.sha256"
          echo "ASSET=$out" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: aggregate checksums
        run: |
          set -eu
          cd dist
          sha256sum bee-* | grep -v '\.sha256$' > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bee-*
            dist/SHA256SUMS
          generate_release_notes: true
